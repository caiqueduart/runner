name: Release CLIs GO

on:
    push:
        branches:
            - main
        paths:
            - 'projects/cli/**'

permissions:
    contents: write

jobs:
    build:
        name: Build para ${{ matrix.goos }}
        runs-on: ubuntu-latest
        strategy:
            matrix:
                goos: [linux, windows, darwin]
                goarch: [amd64]

        defaults:
            run:
                working-directory: projects/cli

        outputs:
            version: ${{ steps.version.outputs.val }}
            tag_exists: ${{ steps.version.outputs.exists }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Configurar Go
              uses: actions/setup-go@v5
              with:
                  go-version: '1.26.x'

            - name: Extrair versão
              id: version
              shell: bash
              run: |
                  RAW_VERSION=$(grep -oP 'AssinaturaCLIVersion\s+= "\K[^"]+' assinatura/internal/constants.go)
                  VERSION="assinatura-cli-v$RAW_VERSION"
                  echo "val=$VERSION" >> $GITHUB_OUTPUT

                  if git ls-remote --tags origin | grep -q "refs/tags/$VERSION"; then
                      echo "exists=true" >> $GITHUB_OUTPUT
                  else
                      echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            - name: Compilar (Build)
              if: steps.version.outputs.exists == 'false'
              run: |
                  BINARY_NAME=assinatura-cli-${{ steps.version.outputs.val }}-${{ matrix.goos }}-${{ matrix.goarch }}
                  if [ "${{ matrix.goos }}" = "windows" ]; then BINARY_NAME=$BINARY_NAME.exe; fi
                  
                  GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o $BINARY_NAME ./assinatura

            - name: Upload de artefatos
              if: steps.version.outputs.exists == 'false'
              uses: actions/upload-artifact@v4
              with:
                  name: binaries-${{ matrix.goos }}
                  path: projects/cli/assinatura-cli-${{ steps.version.outputs.val }}-${{ matrix.goos }}-${{ matrix.goarch }}*

    release:
        name: Criar Release GitHub
        needs: build
        if: needs.build.outputs.tag_exists == 'false'
        runs-on: ubuntu-latest
        steps:
            - name: Download de todos os artefatos
              uses: actions/download-artifact@v4
              with:
                  path: all-binaries
                  pattern: binaries-*
                  merge-multiple: true

            - name: Criar Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.build.outputs.version }}
                  name: Release ${{ needs.build.outputs.version }}
                  generate_release_notes: true
                  files: |
                      all-binaries/*
