name: Release Assinador Java

on:
    push:
        branches:
            - main
        paths:
            - 'projects/assinador/**'

permissions:
    contents: write

jobs:
    build:
        name: Build e Release JAR
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: projects/assinador

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Configurar JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            - name: Extrair versão do Java
              id: version
              shell: bash
              run: |
                  # Extrai a versão a partir do arquivo Version.java
                  RAW_VERSION=$(grep -oP 'public static final String APP_VERSION = "\K[^"]+' src/Version.java)
                  VERSION="assinador-v$RAW_VERSION"
                  echo "VERSION=$VERSION" >> $GITHUB_ENV
                  echo "RAW_VERSION=$RAW_VERSION" >> $GITHUB_ENV

                  # Verifica se a tag já existe no repositório
                  if git ls-remote --tags origin | grep -q "refs/tags/$VERSION"; then
                    echo "TAG_EXISTS=true" >> $GITHUB_ENV
                  else
                    echo "TAG_EXISTS=false" >> $GITHUB_ENV
                  fi

            - name: Compilar e Gerar JAR
              if: env.TAG_EXISTS == 'false'
              run: |
                  mkdir -p bin
                  # Compila todos os arquivos .java do src
                  javac -d bin src/App.java src/Version.java src/services/*.java

                  # Cria o manifesto com a Main-Class
                  echo "Main-Class: App" > manifest.txt

                  # Gera o JAR na raiz da pasta do projeto
                  jar cvfm assinador-v${{ env.RAW_VERSION }}.jar manifest.txt -C bin .

            - name: Upload para Release
              uses: softprops/action-gh-release@v2
              if: env.TAG_EXISTS == 'false'
              with:
                  tag_name: ${{ env.VERSION }}
                  name: 'Release ${{ env.VERSION }}'
                  generate_release_notes: true
                  files: |
                      projects/assinador/assinador-v${{ env.RAW_VERSION }}.jar
