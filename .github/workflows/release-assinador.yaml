name: Release Assinador Java

on:
    push:
        branches:
            - main
        paths:
            - 'projects/assinador/**'

permissions:
    contents: write

jobs:
    build:
        name: Build e Release JAR
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: projects/assinador

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Configurar JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'
                  cache: 'maven'

            - name: Extrair versão do Java
              id: version
              shell: bash
              run: |
                  # Extrai a versão a partir do arquivo Version.java
                  RAW_VERSION=$(grep -oP 'public static final String APP_VERSION = "\K[^"]+' src/main/Version.java)
                  VERSION="assinador-v$RAW_VERSION"
                  echo "VERSION=$VERSION" >> $GITHUB_ENV
                  echo "RAW_VERSION=$RAW_VERSION" >> $GITHUB_ENV

                  # Verifica se a tag já existe no repositório
                  if git ls-remote --tags origin | grep -q "refs/tags/$VERSION"; then
                    echo "TAG_EXISTS=true" >> $GITHUB_ENV
                  else
                    echo "TAG_EXISTS=false" >> $GITHUB_ENV
                  fi

            - name: Sincronizar versão no pom.xml
              if: env.TAG_EXISTS == 'false'
              run: mvn versions:set -DnewVersion=${{ env.RAW_VERSION }} -DgenerateBackupPoms=false

            - name: Build com Maven
              if: env.TAG_EXISTS == 'false'
              run: mvn clean package

            - name: Upload para Release
              uses: softprops/action-gh-release@v2
              if: env.TAG_EXISTS == 'false'
              with:
                  tag_name: ${{ env.VERSION }}
                  name: 'Release ${{ env.VERSION }}'
                  generate_release_notes: true
                  files: |
                      projects/assinador/target/assinador-v${{ env.RAW_VERSION }}.jar
