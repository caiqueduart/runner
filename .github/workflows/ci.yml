name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: projects/assinador/pom.xml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: projects/cli/go.mod
          cache-dependency-path: projects/cli/go.sum

      - name: Build and test assinador
        working-directory: projects/assinador
        run: mvn --batch-mode verify

      - name: Install current assinador for CLI tests
        shell: pwsh
        run: |
          $destination = Join-Path $HOME ".hubsaude/bin"
          New-Item -ItemType Directory -Force -Path $destination | Out-Null
          $assinadorVersion = (Select-String -Path "projects/cli/assinatura/internal/constants.go" -Pattern 'CompatibleAssinadorVersion\s+=\s+"([^"]+)"').Matches.Groups[1].Value
          $jar = "projects/assinador/target/assinador-v$assinadorVersion.jar"
          if (-not (Test-Path $jar)) { throw "JAR esperado nao foi gerado: $jar" }
          Copy-Item $jar $destination

      - name: Check Go formatting
        shell: pwsh
        working-directory: projects/cli
        run: |
          $unformatted = gofmt -l .
          if ($unformatted) {
            Write-Error "Arquivos sem gofmt:`n$($unformatted -join "`n")"
            exit 1
          }

      - name: Vet Go code
        working-directory: projects/cli
        run: go vet ./...

      - name: Test Go code
        working-directory: projects/cli
        run: go test ./...

      - name: Build CLIs
        working-directory: projects/cli
        run: go build ./...
